services:
  - type: pserv
    name: cropcloud-api
    env: node
    plan: free
    repo: https://github.com/HarshaVardhan2709/CROPCLOUDV2-MAIN
    branch: master
    rootDir: apps/api
    buildCommand: cd ../.. && npm install -g pnpm && pnpm install && pnpm exec prisma generate && cd apps/api && pnpm build
    startCommand: node dist/main
      - fromGroup: cropcloud-api

  - type: postgres
    name: cropcloud-db
    plan: free
    databaseName: neondb
    user: neondb_owner
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cropcloud-db
          property: connectionString

envVarGroups:
  - name: cropcloud-api
    envVars:
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
