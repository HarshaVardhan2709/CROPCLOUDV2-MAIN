# For Railway deployment
# Change 5432 to 5432
# Set build command: pnpm install && pnpm build --filter=api
# Set start command: pnpm start --filter=api
# Railway will auto-detect this Dockerfile if needed

version: '3.8'

services:
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_TTL=15m
      - JWT_REFRESH_TTL=7d
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cropcloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
